name: Release

# Manual, deliberate releases: pick a version bump and run it from the Actions
# tab. `nx release` versions every publishable package, writes changelogs, tags,
# and publishes to npm (config lives in nx.json `release`).
#
# Publishing uses npm Trusted Publishing (OIDC) — no npm token. Each package has
# a Trusted Publisher on npmjs.com pointing at this repo + workflow, and npm
# mints a short-lived credential from the GitHub OIDC identity at publish time
# (which also produces provenance automatically).
on:
  workflow_dispatch:
    inputs:
      specifier:
        description: 'Version bump (patch | minor | major | prerelease | <explicit version>)'
        type: string
        default: prerelease
      preid:
        description: 'Prerelease identifier (only used for pre* specifiers)'
        type: string
        default: alpha
      dryRun:
        description: 'Dry run — compute and print the release without publishing or pushing'
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # commit the version bump + push the release tag
  id-token: write # OIDC trusted publishing to npm (+ provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so nx can derive the previous version/changelog.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Trusted Publishing (OIDC token exchange) requires npm >= 11.5.1; the npm
      # bundled with Node 22 is older, so upgrade it before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run nx release
        run: |
          DRY=""
          if [ "${{ inputs.dryRun }}" = "true" ]; then DRY="--dry-run"; fi
          npx nx release "${{ inputs.specifier }}" --preid="${{ inputs.preid }}" $DRY --yes
        # No NODE_AUTH_TOKEN: npm authenticates via OIDC trusted publishing using
        # the `id-token: write` permission above.

      - name: Push release commit and tag
        if: ${{ inputs.dryRun == false }}
        run: git push --follow-tags origin HEAD
