name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. quick successive PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `nx affected` can diff against the base commit.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Replaces Nx Cloud's remote cache: persist the local Nx cache between runs.
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      # Derives the base/head SHAs `nx affected` diffs against (last successful
      # run on push to main, the PR base on pull_request).
      - uses: nrwl/nx-set-shas@v4

      - name: Lint and build affected projects
        run: npx nx run-many -t lint build

      # Run the full test suite (not `affected`) so coverage is always complete:
      # Codecov needs the whole report every run to track the project total, and
      # an `affected` run can legitimately test nothing and emit no lcov.
      # `--skip-nx-cache` so the run always executes and writes fresh lcov: a
      # cache hit replays the task without re-emitting the coverage files, which
      # would leave Codecov with nothing to upload.
      - name: Test with coverage
        run: npx nx run-many -t test --coverage --coverageReporters=lcov --coverageReporters=text-summary --exclude=@tactical-ddd/nx-e2e --skip-nx-cache

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # The lcov files Jest writes per project (Codecov auto-discovers them).
          files: ./packages/nx/test-output/jest/coverage/lcov.info,./packages/react/test-output/jest/coverage/lcov.info
          # Don't fail the build if the upload itself hiccups.
          fail_ci_if_error: false
